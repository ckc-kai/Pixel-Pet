<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Pet</title>
    <style>
      /* Transparent canvas. Belt + suspenders: pet-states.css applies the
         same rules with !important, but inlining them here prevents a
         white flash before that stylesheet attaches (the WebView seeds
         opaque white as the default in dev mode on macOS). */
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent !important;
        background-color: transparent !important;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/pet-main.tsx"></script>
  </body>
</html>
